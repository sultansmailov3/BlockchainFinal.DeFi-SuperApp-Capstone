specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AMM
    network: arbitrum-sepolia
    source:
      address: "0xEb33bC9caD08F62A04c2Fd17ac242aE5c68DAe34"
      abi: AMM
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - LiquidityPosition
      abis:
        - name: AMM
          file: ./abis/AMM.json
      eventHandlers:
        - event: Swap(indexed address,uint256,uint256,bool)
          handler: handleSwap
        - event: Mint(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
      file: ./src/amm.ts
  - kind: ethereum
    name: Governor
    network: arbitrum-sepolia
    source:
      address: "0x357BbC9D5D6D3964738F6B0fB2114c2EfB194258"
      abi: Governor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
      abis:
        - name: Governor
          file: ./abis/Governor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
      file: ./src/governor.ts
